    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      
      :root {
        --bg-main: #020617;
        --bg-card: rgba(15, 23, 42, 0.4);
        --text-primary: #F8FAFC;
        --text-secondary: #94A3B8;
        --brand-accent: #0070FF; 
        --brand-glow: rgba(0, 112, 255, 0.5);
        --cyan-glow: rgba(56, 189, 248, 0.5);
        transition: background-color 0.4s ease;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-primary);
        margin: 0;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1E293B;
        border-radius: 10px;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(40px) saturate(150%);
        -webkit-backdrop-filter: blur(40px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
      }

      .deep-tech-bg {
        background: radial-gradient(circle at 50% 50%, #0F172A 0%, #020617 100%);
      }

      .neon-streak {
        position: absolute;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--brand-accent), transparent);
        filter: blur(1px);
        opacity: 0.4;
        pointer-events: none;
      }

      .neon-streak-horizontal {
        width: 300px;
        animation: streak-slide 10s linear infinite;
      }

      @keyframes streak-slide {
        0% { transform: translateX(-100vw); }
        100% { transform: translateX(100vw); }
      }

      @keyframes float {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(0.5deg); }
        100% { transform: translateY(0px) rotate(0deg); }
      }

      .float-animation {
        animation: float 10s ease-in-out infinite;
      }

      .glow-pulse {
        animation: glow-pulse 4s ease-in-out infinite;
      }

      @keyframes glow-pulse {
        0%, 100% { filter: drop-shadow(0 0 5px var(--brand-glow)); }
        50% { filter: drop-shadow(0 0 20px var(--brand-glow)); }
      }
    </style>
